<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" th:href="@{/static/style.css}">
</head>
<body>
    <div class="container">
        <h2>Xin chào, <span th:text="${user.username}">User</span></h2>
        <p>Vai trò: <span th:text="${user.role}">ROLE</span></p>

        <div th:switch="${user.role}">
            <div th:case="'ADMIN'">
                <h3>Menu Admin</h3>
                <ul>
                    <li><a href="#">Quản lý tài khoản</a></li>
                    <li><a href="#">Quản lý phòng</a></li>
                    <li><a href="#">Quản lý hợp đồng</a></li>
                </ul>
            </div>
            <div th:case="'MANAGER'">
                <h3>Menu Manager</h3>
                <ul>
                    <li><a href="#">Quản lý sinh viên</a></li>
                    <li><a href="#">Xem báo cáo</a></li>
                </ul>
            </div>
            <div th:case="'STUDENT'">
                <h3>Menu Sinh Viên</h3>
                <ul>
                    <li><a href="#">Xem thông tin cá nhân</a></li>
                    <li><a href="#">Xem hợp đồng</a></li>
                </ul>
            </div>
        </div>

        <a href="/logout">Đăng xuất</a>
    </div>
</body>
</html>
